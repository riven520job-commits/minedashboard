<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顯化人生 - Notion極簡版</title>
    <meta name="theme-color" content="#0B0B0B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MANIFEST">
    <link rel="icon" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"%3E%3Crect width="512" height="512" rx="82" fill="%230b0b0b"/%3E%3Crect x="54" y="54" width="404" height="404" rx="22" fill="none" stroke="%23f7f5ef" stroke-width="10"/%3E%3Ctext x="256" y="254" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="116" font-weight="700" fill="%23f7f5ef" letter-spacing="-8"%3EMF%3C/text%3E%3Ctext x="256" y="336" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" fill="%23f7f5ef" letter-spacing="8"%3EATELIER%3C/text%3E%3C/svg%3E'>
    <link rel="apple-touch-icon" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"%3E%3Crect width="512" height="512" rx="82" fill="%230b0b0b"/%3E%3Crect x="54" y="54" width="404" height="404" rx="22" fill="none" stroke="%23f7f5ef" stroke-width="10"/%3E%3Ctext x="256" y="254" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="116" font-weight="700" fill="%23f7f5ef" letter-spacing="-8"%3EMF%3C/text%3E%3Ctext x="256" y="336" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" fill="%23f7f5ef" letter-spacing="8"%3EATELIER%3C/text%3E%3C/svg%3E'>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Inter"', '"Noto Sans TC"', 'sans-serif'], },
                    colors: {
                        notion: { bg: '#FFFFFF', card: '#FFFFFF', text: '#37352F', muted: '#9B9B9B', border: '#EAEAEA', hover: '#F1F1EF', btn: '#2E2C27' }
                    },
                    borderRadius: { 'notion': '6px', }
                }
            }
        }
    </script>
    <style>
        body { background-color: #FFFFFF; color: #37352F; -webkit-tap-highlight-color: transparent; }
        input[type="checkbox"]:checked + span { text-decoration: line-through; color: #9B9B9B; }
        details > summary { list-style: none; outline: none; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] summary svg { transform: rotate(90deg); }
        button:focus-visible, input:focus-visible, textarea:focus-visible, summary:focus-visible, a:focus-visible {
            outline: 2px solid #37352F;
            outline-offset: 2px;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        
        @keyframes fadeUp {
            0% { opacity: 0; transform: translate(-50%, 10px); }
            10% { opacity: 1; transform: translate(-50%, 0); }
            90% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -10px); }
        }
        .toast-animate { animation: fadeUp 2.5s ease-in-out forwards; }
        
        .stamp-yoku {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg);
            border: 1.5px solid #D94F4F; color: #D94F4F; border-radius: 50%;
            font-size: 8px; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            text-align: center; line-height: 1.1; font-weight: 700;
            opacity: 0.85; pointer-events: none;
            box-shadow: inset 0 0 0 1px rgba(217, 79, 79, 0.2); letter-spacing: -0.5px;
        }
        .app-mark {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: #0B0B0B;
            color: #F7F5EF;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #0B0B0B;
            box-shadow: inset 0 0 0 1px rgba(247, 245, 239, 0.18);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: -0.04em;
        }
        .today-cell {
            border-color: #2E2C27;
            box-shadow: inset 0 0 0 1px #2E2C27, 0 0 0 2px #F7F5EF;
        }
        .today-label {
            position: absolute;
            right: 4px;
            bottom: 4px;
            font-size: 7px;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #2E2C27;
            border-top: 1px solid #2E2C27;
            padding-top: 1px;
        }
        .suggestion-chip {
            border: 1px solid #EAEAEA;
            background: #FFFFFF;
            color: #37352F;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 11px;
            line-height: 1;
        }
        .suggestion-chip:active {
            background: #F1F1EF;
        }
        .feature-tile {
            border: 1px solid #EAEAEA;
            background: #FFFFFF;
            border-radius: 8px;
            padding: 16px;
            text-align: left;
            min-height: 92px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .feature-tile:active {
            background: #F1F1EF;
            transform: scale(0.99);
        }
    </style>
</head>
<body class="flex flex-col h-[100dvh] max-w-md mx-auto select-none font-sans border-x border-notion-border relative">

    <header class="py-3 px-5 bg-notion-card border-b border-notion-border sticky top-0 z-10">
        <button id="back-home" onclick="switchTab('home')" class="hidden text-sm bg-notion-hover border border-notion-border text-notion-text px-3 py-2 rounded-notion active:bg-gray-200" aria-label="回到首頁">← 首頁</button>
        <div id="home-brand" class="flex justify-between items-center gap-3">
            <div class="flex items-center gap-2 min-w-0">
            <div class="app-mark" aria-hidden="true">MF</div>
            <div id="header-icon" class="text-notion-text hidden min-[360px]:block" aria-hidden="true"></div>
            <h1 id="header-title" class="text-base font-semibold tracking-wide leading-snug">我會成為我想成為的人</h1>
            </div>
            <span class="text-xs text-notion-muted font-medium hidden min-[360px]:inline" id="current-date"></span>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto pb-8 px-5 pt-5 space-y-6 hide-scrollbar">
        
        <div id="page-home" class="space-y-5">
            <div class="space-y-1">
                <p class="text-xs text-notion-muted font-medium tracking-wider uppercase">Manifest Atelier</p>
                <h2 class="text-2xl font-semibold leading-tight text-notion-text">今天想照顧哪一部分？</h2>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="switchTab('goals')" class="feature-tile"><span class="text-lg font-semibold">目標</span><span class="text-xs text-notion-muted">日曆與待辦</span></button>
                <button onclick="switchTab('workout')" class="feature-tile"><span class="text-lg font-semibold">運動</span><span class="text-xs text-notion-muted">減肥影片庫</span></button>
                <button onclick="switchTab('log')" class="feature-tile"><span class="text-lg font-semibold">紀錄</span><span class="text-xs text-notion-muted">體重飲食照片</span></button>
                <button onclick="switchTab('journal')" class="feature-tile"><span class="text-lg font-semibold">日記</span><span class="text-xs text-notion-muted">顯化筆記</span></button>
                <button onclick="switchTab('shrine')" class="feature-tile"><span class="text-lg font-semibold">神社</span><span class="text-xs text-notion-muted">參拜與願望</span></button>
                <button onclick="switchTab('meditation')" class="feature-tile"><span class="text-lg font-semibold">冥想</span><span class="text-xs text-notion-muted">計時與導引</span></button>
            </div>
            <button onclick="switchTab('settings')" class="w-full py-3 text-sm bg-notion-btn text-white rounded-notion font-medium">設定 / 同步 / 備份</button>
        </div>

        <div id="page-goals" class="space-y-4 hidden">
            <div class="flex items-center justify-between pb-2 border-b border-notion-border">
                <button onclick="changeMonth(-1)" class="px-2 py-1 text-notion-muted hover:text-notion-text active:scale-90 transition-transform" aria-label="上一個月">◀</button>
                <span class="text-sm font-semibold text-notion-text tracking-wider" id="calendar-month-year"></span>
                <button onclick="changeMonth(1)" class="px-2 py-1 text-notion-muted hover:text-notion-text active:scale-90 transition-transform" aria-label="下一個月">▶</button>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-medium text-notion-muted mb-1">
                <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-1.5"></div>
            <p class="text-[10px] text-notion-muted text-center pt-2">點擊日期即可新增或管理目標</p>
        </div>

        <div id="page-workout" class="space-y-5 hidden">
            <div class="flex items-center justify-between pb-2 border-b border-notion-border">
                <span class="text-xs font-semibold text-notion-muted tracking-wider uppercase">常用運動影片</span>
            </div>
            <div class="bg-notion-card border border-notion-border rounded-notion p-4 space-y-3 shadow-sm">
                <input type="text" id="workout-title" placeholder="影片名稱 (例：15分鐘燃脂腹肌)" class="w-full text-sm border border-notion-border rounded px-3 py-2 focus:outline-none focus:border-notion-muted">
                <input type="url" id="workout-url" placeholder="貼上 YouTube 連結..." class="w-full text-sm border border-notion-border rounded px-3 py-2 focus:outline-none focus:border-notion-muted">
                <select id="workout-part" class="w-full text-sm border border-notion-border rounded px-3 py-2 bg-white focus:outline-none focus:border-notion-muted" aria-label="選擇減肥部位">
                    <option value="全身">全身燃脂</option>
                    <option value="腹部">腹部核心</option>
                    <option value="臀腿">臀腿</option>
                    <option value="手臂">手臂</option>
                    <option value="背部">背部</option>
                    <option value="有氧">有氧</option>
                    <option value="伸展">伸展放鬆</option>
                </select>
                <button onclick="saveWorkout()" class="w-full py-2.5 text-sm bg-notion-btn text-white rounded-notion font-medium hover:opacity-90 active:scale-[0.98] transition-transform">新增至影片庫</button>
            </div>
            <div id="workout-filter" class="flex gap-2 overflow-x-auto pb-1" aria-label="減肥部位篩選"></div>
            <div id="workout-list" class="grid grid-cols-2 gap-3 mt-4"></div>
        </div>

        <div id="page-log" class="space-y-5 hidden">
            <div class="flex items-center justify-between pb-2 border-b border-notion-border">
                <span class="text-xs font-semibold text-notion-muted tracking-wider uppercase">今日狀態紀錄</span>
            </div>
            <div class="bg-notion-card border border-notion-border rounded-notion p-4 space-y-4 shadow-sm">
                <div class="flex items-center gap-3">
                    <label for="log-weight" class="text-sm w-12 text-notion-text font-medium">體重</label>
                    <input type="number" step="0.1" id="log-weight" placeholder="kg" class="flex-1 text-sm border border-notion-border rounded px-2 py-2 focus:outline-none focus:border-notion-muted">
                </div>
                <div class="flex items-center gap-3">
                    <label for="log-food" class="text-sm w-12 text-notion-text font-medium">飲食</label>
                    <input type="text" id="log-food" placeholder="記錄飲食內容..." class="flex-1 text-sm border border-notion-border rounded px-2 py-2 focus:outline-none focus:border-notion-muted">
                </div>
                <div id="today-video-summary" class="hidden text-xs bg-notion-hover border border-notion-border rounded p-3 leading-relaxed"></div>
                <div class="flex items-center gap-3 pt-1">
                    <label for="log-image" class="text-sm w-12 text-notion-text font-medium">照片</label>
                    <input type="file" id="log-image" accept="image/*" class="flex-1 text-xs text-notion-muted file:mr-2 file:py-1.5 file:px-3 file:border-0 file:text-xs file:bg-notion-hover file:text-notion-text file:rounded cursor-pointer">
                </div>
                <button onclick="saveLog()" class="w-full py-3 text-sm bg-notion-btn text-white rounded-notion font-medium hover:opacity-90 mt-2 active:scale-[0.98] transition-transform">儲存紀錄</button>
            </div>
            <div class="space-y-3">
                <span class="text-xs font-medium text-notion-muted block">歷史紀錄</span>
                <div id="log-list" class="space-y-3"></div>
            </div>
        </div>

        <div id="page-journal" class="space-y-4 hidden">
            <div class="flex justify-between items-center pb-2 border-b border-notion-border">
                <span class="text-xs font-semibold text-notion-muted tracking-wider uppercase">顯化日記清單</span>
                <button onclick="openJournalModal()" class="text-xs bg-notion-btn text-white px-4 py-1.5 rounded-notion active:scale-95 transition-transform">寫作</button>
            </div>
            <div id="journal-list" class="space-y-2"></div>
        </div>

        <div id="page-shrine" class="space-y-5 hidden">
            <div class="bg-notion-card border border-notion-border rounded-notion p-4 space-y-3 shadow-sm">
                <div class="flex items-center justify-between pb-2 border-b border-notion-border">
                    <span class="text-sm font-semibold text-notion-text tracking-wider uppercase">⛩️ 想去的神社清單</span>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="shrine-wish-input" placeholder="新增想去的神社名稱..." class="flex-1 text-sm border border-notion-border rounded px-3 py-2 focus:outline-none focus:border-notion-muted">
                    <button onclick="addShrineWish()" class="text-xs bg-notion-btn text-white px-4 py-2 rounded-notion active:scale-95 transition-transform">新增</button>
                </div>
                <p class="text-[10px] text-notion-muted">💡 打勾後會自動將神社名稱帶入下方的參拜紀錄中</p>
                <div id="shrine-wish-list" class="space-y-2 mt-2 max-h-48 overflow-y-auto pr-1"></div>
            </div>

            <div class="bg-notion-card border border-notion-border rounded-notion p-4 space-y-4 shadow-sm mt-6">
                <div class="flex items-center justify-between pb-2 border-b border-notion-border">
                    <span class="text-sm font-semibold text-notion-text tracking-wider uppercase">✍️ 新增參拜紀錄</span>
                </div>
                <div class="flex items-center gap-3">
                    <label for="shrine-name" class="text-sm w-12 text-notion-text font-medium">神社</label>
                    <input type="text" id="shrine-name" placeholder="例如：明治神宮" class="flex-1 text-sm border border-notion-border rounded px-2 py-2 focus:outline-none focus:border-notion-muted transition-colors duration-300">
                </div>
                <div class="flex items-center gap-3">
                    <label for="shrine-address" class="text-sm w-12 text-notion-text font-medium">地址</label>
                    <input type="text" id="shrine-address" placeholder="(選填) 東京都涉谷區..." class="flex-1 text-sm border border-notion-border rounded px-2 py-2 focus:outline-none focus:border-notion-muted">
                </div>
                <div class="flex items-center gap-3">
                    <label for="shrine-date" class="text-sm w-12 text-notion-text font-medium">日期</label>
                    <input type="date" id="shrine-date" class="flex-1 text-sm border border-notion-border rounded px-2 py-2 focus:outline-none focus:border-notion-muted">
                </div>
                <div class="flex items-start gap-3">
                    <label for="shrine-notes" class="text-sm w-12 text-notion-text font-medium pt-2">祈願</label>
                    <textarea id="shrine-notes" rows="2" placeholder="寫下祈求的願望或心情..." class="flex-1 text-sm border border-notion-border rounded px-2 py-2 focus:outline-none focus:border-notion-muted resize-none"></textarea>
                </div>
                <div class="flex items-center gap-3 pt-1">
                    <label for="shrine-image" class="text-sm w-12 text-notion-text font-medium">朱印</label>
                    <input type="file" id="shrine-image" accept="image/*" class="flex-1 text-xs text-notion-muted file:mr-2 file:py-1.5 file:px-3 file:border-0 file:text-xs file:bg-notion-hover file:text-notion-text file:rounded cursor-pointer">
                </div>
                <button onclick="saveShrine()" class="w-full py-3 text-sm bg-notion-btn text-white rounded-notion font-medium hover:opacity-90 mt-2 active:scale-[0.98] transition-transform">儲存紀錄</button>
            </div>
            
            <div class="space-y-3 pb-4">
                <span class="text-xs font-medium text-notion-muted block">參拜歷史</span>
                <div id="shrine-list" class="space-y-3"></div>
            </div>
        </div>

        <div id="page-meditation" class="space-y-5 hidden">
            <div class="bg-notion-card border border-notion-border rounded-notion p-5 text-center shadow-sm space-y-5">
                <h2 class="text-sm font-semibold text-notion-text tracking-widest uppercase pb-2 border-b border-notion-border">冥想計時器</h2>
                <div class="text-5xl font-light tracking-widest text-notion-text font-mono py-2" id="timer-display">15:00</div>
                <div class="flex justify-center items-center gap-2">
                    <label for="timer-input" class="sr-only">冥想分鐘數</label>
                    <input type="number" id="timer-input" value="15" class="w-16 text-center text-base border-b border-notion-muted px-1 py-1 focus:outline-none" min="1" max="240">
                    <span class="text-sm text-notion-muted">分鐘</span>
                </div>
                <div class="flex gap-3 justify-center pt-2">
                    <button onclick="startTimer()" id="btn-timer-start" class="px-8 py-2.5 text-sm bg-notion-btn text-white rounded-notion font-medium active:scale-95 transition-transform">開始</button>
                    <button onclick="stopTimer()" class="px-6 py-2.5 text-sm bg-notion-hover text-notion-text border border-notion-border rounded-notion font-medium active:bg-gray-200">停止</button>
                </div>
                <div class="pt-4 border-t border-notion-border mt-4">
                    <div class="flex flex-col gap-3 items-center">
                        <span id="music-status" class="text-xs text-notion-muted bg-notion-hover px-3 py-1 rounded">未載入預設本地音樂</span>
                        <input type="file" id="bgm-upload" accept="audio/*" class="w-full text-xs text-notion-muted file:mr-2 file:py-1.5 file:px-3 file:border-0 file:text-xs file:bg-notion-hover file:text-notion-text file:rounded cursor-pointer">
                        <button onclick="saveMusicToDB()" class="w-full py-2 text-sm bg-notion-hover border border-notion-border text-notion-text rounded-notion active:bg-gray-200">💾 儲存為預設本地音樂</button>
                        <audio id="med-audio" loop></audio>
                    </div>
                </div>
            </div>

            <div class="bg-notion-card border border-notion-border rounded-notion p-4 space-y-3 shadow-sm">
                <div class="flex items-center justify-between pb-2 border-b border-notion-border">
                    <span class="text-sm font-semibold text-notion-text tracking-wider uppercase">冥想導引影片庫</span>
                </div>
                <input type="text" id="med-video-title" placeholder="影片名稱 (例：10分鐘頌缽音療)" class="w-full text-sm border border-notion-border rounded px-3 py-2 focus:outline-none focus:border-notion-muted">
                <input type="url" id="med-video-url" placeholder="貼上 YouTube 連結..." class="w-full text-sm border border-notion-border rounded px-3 py-2 focus:outline-none focus:border-notion-muted">
                <button onclick="saveMeditationVideo()" class="w-full py-2.5 text-sm bg-notion-btn text-white rounded-notion font-medium hover:opacity-90 active:scale-[0.98] transition-transform">新增導引影片</button>
                <div id="med-video-list" class="grid grid-cols-2 gap-3 mt-4 pt-2"></div>
            </div>

            <div class="bg-notion-card border border-notion-border rounded-notion p-4 space-y-4 shadow-sm">
                <div class="flex items-start gap-3">
                    <label for="med-notes" class="text-sm w-16 text-notion-text font-medium pt-2">覺察筆記</label>
                    <textarea id="med-notes" rows="2" placeholder="冥想後的感受或啟發..." class="flex-1 text-sm border border-notion-border rounded px-2 py-2 focus:outline-none focus:border-notion-muted resize-none"></textarea>
                </div>
                <button onclick="saveMeditation()" class="w-full py-3 text-sm bg-notion-btn text-white rounded-notion font-medium hover:opacity-90 active:scale-[0.98] transition-transform">儲存紀錄</button>
            </div>
            
            <div class="space-y-3 pb-4">
                <span class="text-xs font-medium text-notion-muted block">歷史紀錄</span>
                <div id="meditation-list" class="space-y-2"></div>
            </div>
        </div>

        <div id="page-settings" class="space-y-5 hidden">
            <div class="space-y-1">
                <h2 class="text-xl font-semibold text-notion-text">設定</h2>
                <p class="text-xs text-notion-muted">資料備份、還原與雲端同步</p>
            </div>
            <div class="bg-notion-card border border-notion-border rounded-notion p-4 space-y-3 shadow-sm">
                <button onclick="openSyncModal()" class="w-full py-3 text-sm bg-notion-btn text-white rounded-notion font-medium">Gmail / 雲端同步</button>
                <button onclick="exportData()" class="w-full py-3 text-sm bg-notion-hover border border-notion-border text-notion-text rounded-notion font-medium">備份到本機</button>

    <script>
        const ICONS = {
            home: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>`,
            workout: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg>`,
            log: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>`,
            journal: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>`,
            shrine: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M6 6v16M18 6v16M4 10h16M9 10v6M15 10v6"/><path d="M2 6h20"/></svg>`,
            meditation: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path></svg>`
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.classList.remove('hidden'); toast.classList.add('toast-animate');
            setTimeout(() => { toast.classList.remove('toast-animate'); toast.classList.add('hidden'); }, 2500);
        }

        function escapeHTML(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        function getStorageArray(key) {
            try {
                const value = JSON.parse(localStorage.getItem(key) || '[]');
                return Array.isArray(value) ? value : [];
            } catch {
                return [];
            }
        }

        function safeExternalURL(url) {
            try {
                const parsed = new URL(url);
                return ['https:', 'http:'].includes(parsed.protocol) ? parsed.href : '#';
            } catch {
                return '#';
            }
        }

        function getEmptyStateHTML(msg) { return `<div class="text-center py-6 col-span-2 text-notion-muted text-xs bg-notion-hover border border-dashed border-notion-border rounded w-full">${escapeHTML(msg)}</div>`; }

        const STORAGE_KEYS = [
            'notion_todos_v2',
            'notion_workouts',
            'notion_logs_v2',
            'notion_journals_v2',
            'notion_shrine_wishes',
            'notion_shrines',
            'notion_med_videos',
            'notion_meditation',
            'notion_video_views'
        ];

        const SYNC_SETTINGS_KEY = 'manifestation_sync_settings';
        const SUPABASE_URL = 'https://iqbkizoojhcjeoabghvq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_UBILTYcAxnDMitdXDWCOoA_2ioS966t';

        function getAllAppData() {
            return STORAGE_KEYS.reduce((acc, key) => {
                acc[key] = localStorage.getItem(key);
                return acc;
            }, {});
        }

        function applyAppData(data) {
            STORAGE_KEYS.forEach(key => {
                if (typeof data?.[key] === 'string') localStorage.setItem(key, data[key]);
            });
            renderCalendar(); loadWorkouts(); loadLogs(); loadJournals(); loadShrines(); loadShrineWishes(); loadMeditations(); loadMeditationVideos();
        }

        function exportData() {
            const data = getAllAppData();
            const blob = new Blob([JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), data }, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `manifestation-backup-${getFormatDate(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate())}.json`;
            a.click();
            URL.revokeObjectURL(a.href);
            showToast('備份檔已建立');
        }

        function importData(file) {
            const reader = new FileReader();
            reader.onload = () => {
                try {
                    const parsed = JSON.parse(reader.result);
                    const data = parsed.data || {};
                    applyAppData(data);
                    showToast('資料已還原');
                } catch {
                    showToast('備份檔格式不正確');
                }
            };
            reader.readAsText(file);
        }

        let db;
        const initDB = () => {
            const request = indexedDB.open("ManifestationAppDB", 1);
            request.onupgradeneeded = e => {
                const database = e.target.result;
                if (!database.objectStoreNames.contains("settings")) database.createObjectStore("settings");
            };
            request.onsuccess = e => { db = e.target.result; loadSavedMusic(); };
        };

        let currentDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();
        let selectedDateStr = "";
        const padDate = n => n < 10 ? '0' + n : n;
        const getFormatDate = (y, m, d) => `${y}-${padDate(m + 1)}-${padDate(d)}`;
        const todayKey = () => getFormatDate(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate());
        const GOAL_SUGGESTIONS = [
            '喝水 2000ml',
            '走路 8000 步',
            '完成 20 分鐘運動',
            '冥想 10 分鐘',
            '睡前不滑手機',
            '整理房間 10 分鐘',
            '寫下 3 件感謝',
            '蛋白質吃夠'
        ];
        const WORKOUT_PARTS = ['全部', '全身', '腹部', '臀腿', '手臂', '背部', '有氧', '伸展', '未分類'];
        let workoutFilter = '全部';

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('current-date').innerText = `${currentDate.getFullYear()}/${padDate(currentDate.getMonth()+1)}/${padDate(currentDate.getDate())}`;
            document.getElementById('shrine-date').valueAsDate = new Date();
            document.getElementById('header-icon').innerHTML = ICONS.home;

            renderGoalSuggestions();
            renderWorkoutFilters();
            initDB(); renderCalendar(); loadWorkouts(); loadLogs(); loadJournals(); loadShrines(); loadShrineWishes(); loadMeditations(); loadMeditationVideos();

            document.getElementById('bgm-upload').addEventListener('change', function(e) {
                if(e.target.files[0]) {
                    document.getElementById('med-audio').src = URL.createObjectURL(e.target.files[0]);
                    document.getElementById('music-status').innerText = '🎵 當前選取：' + e.target.files[0].name;
                }
            });
            document.getElementById('import-data').addEventListener('change', function(e) {
                if(e.target.files[0]) importData(e.target.files[0]);
                e.target.value = '';
            });
            handleAuthRedirect();
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') {
                    if (!document.getElementById('modal-journal').classList.contains('hidden')) closeJournalModal();
                    if (!document.getElementById('modal-daily').classList.contains('hidden')) closeDailyModal();
                    if (!document.getElementById('modal-sync').classList.contains('hidden')) closeSyncModal();
                }
            });
        });

        function switchTab(tabName) {
            ['home', 'goals', 'workout', 'log', 'journal', 'shrine', 'meditation', 'settings'].forEach(tab => {
                document.getElementById(`page-${tab}`).classList.add('hidden');
            });
            document.getElementById(`page-${tabName}`).classList.remove('hidden');
            const isHome = tabName === 'home';
            document.getElementById('home-brand').classList.toggle('hidden', !isHome);
            document.getElementById('back-home').classList.toggle('hidden', isHome);
            window.scrollTo(0,0);
        }

        function getYouTubeId(url) {
            const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))((\w|-){11})/);
            return (match && match[1]) ? match[1] : null;
        }

        function recordVideoWatch(storeKey, index, label, event) {
            if (event) event.preventDefault();
            const videos = getStorageArray(storeKey);
            const video = videos[index];
            if (!video) return;
            const url = safeExternalURL(video.url);
            if (url === '#') return showToast('影片連結無效');

            const dateKey = todayKey();
            const title = video.title || '未命名影片';
            const views = getStorageArray('notion_video_views');
            const view = views.find(v => v.date === dateKey && v.title === title && v.type === label);
            if (view) {
                view.count += 1;
                view.lastWatchedAt = new Date().toISOString();
            } else {
                views.push({ date: dateKey, title, type: label, count: 1, lastWatchedAt: new Date().toISOString() });
            }
            localStorage.setItem('notion_video_views', JSON.stringify(views));

            const logs = getStorageArray('notion_logs_v2');
            const localeDate = new Date().toLocaleDateString();
            let log = logs.find(item => item.date === localeDate && item.autoVideo);
            if (!log) {
                log = { date: localeDate, weight: '', food: '', image: null, videoViews: [], autoVideo: true };
                logs.push(log);
            }
            if (!Array.isArray(log.videoViews)) log.videoViews = [];
            const logView = log.videoViews.find(v => v.title === title && v.type === label);
            if (logView) logView.count += 1;
            else log.videoViews.push({ title, type: label, count: 1 });
            while (logs.length > 30) logs.shift();
            localStorage.setItem('notion_logs_v2', JSON.stringify(logs));
            loadLogs();
            showToast(`${label}已觀看 ${log.videoViews.find(v => v.title === title && v.type === label).count} 次`);
            window.open(url, '_blank', 'noopener,noreferrer');
        }

        function getTodayVideoViews() {
            return getStorageArray('notion_video_views').filter(v => v.date === todayKey());
        }

        function renderTodayVideoSummary() {
            const box = document.getElementById('today-video-summary');
            if (!box) return;
            const views = getTodayVideoViews();
            if (views.length === 0) {
                box.classList.add('hidden');
                box.innerHTML = '';
                return;
            }
            box.classList.remove('hidden');
            box.innerHTML = `<div class="text-[10px] text-notion-muted tracking-wider uppercase mb-2">今日已觀看影片</div>${views.map(v => `<div class="flex justify-between gap-3 py-0.5"><span class="truncate">${escapeHTML(v.type)}｜${escapeHTML(v.title)}</span><span class="font-semibold shrink-0">${escapeHTML(v.count)} 次</span></div>`).join('')}`;
        }

        function openSyncModal() {
            document.getElementById('sync-status').innerText = '請先登入 Gmail';
            refreshAuthStatus();
            document.getElementById('modal-sync').classList.remove('hidden');
            document.getElementById('modal-sync').classList.add('flex');
        }

        function closeSyncModal() {
            document.getElementById('modal-sync').classList.add('hidden');
            document.getElementById('modal-sync').classList.remove('flex');
        }

        function getSyncSettings() {
            try {
                return JSON.parse(localStorage.getItem(SYNC_SETTINGS_KEY) || '{}');
            } catch {
                return {};
            }
        }

        function setSyncStatus(message) {
            const status = document.getElementById('sync-status');
            if (status) status.innerText = message;
        }

        async function createSupabaseFromSettings(requireSyncId = true) {
            const stored = getSyncSettings();
            const settings = { ...stored, url: SUPABASE_URL, key: SUPABASE_KEY };
            if (!settings.syncId && requireSyncId) throw new Error('missing-session');
            try {
                const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
                return {
                    client: createClient(settings.url, settings.key, {
                        auth: {
                            persistSession: true,
                            autoRefreshToken: true,
                            detectSessionInUrl: true
                        }
                    }),
                    syncId: settings.syncId,
                    settings
                };
            } catch {
                throw new Error('supabase-load-failed');
            }
        }

        async function getSupabaseClient() {
            return createSupabaseFromSettings(true);
        }

        async function getAuthClient() {
            return createSupabaseFromSettings(false);
        }

        async function refreshAuthStatus() {
            const status = document.getElementById('auth-status');
            if (!status) return;
            try {
                const { client, settings } = await getAuthClient();
                const { data } = await client.auth.getSession();
                const user = data.session?.user;
                if (!user) {
                    status.innerText = '尚未登入 Gmail';
                    return;
                }
                const syncId = `gmail:${user.id}`;
                const merged = { ...settings, syncId };
                localStorage.setItem(SYNC_SETTINGS_KEY, JSON.stringify(merged));
                status.innerText = `已登入：${user.email || 'Google 帳號'}`;
                setSyncStatus('已登入，可上傳或下載雲端資料');
            } catch {
                status.innerText = '尚未連線 Supabase Auth';
            }
        }

        function getRedirectUrl() {
            return `${window.location.origin}${window.location.pathname}`;
        }

        async function handleAuthRedirect() {
            const params = new URLSearchParams(window.location.search);
            const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
            const errorDescription = params.get('error_description') || hash.get('error_description');
            if (errorDescription) {
                localStorage.setItem('manifestation_auth_error', errorDescription);
                window.history.replaceState({}, document.title, getRedirectUrl());
            }
            if (params.get('code')) {
                try {
                    const { client } = await getAuthClient();
                    await client.auth.exchangeCodeForSession(params.get('code'));
                    window.history.replaceState({}, document.title, getRedirectUrl());
                } catch {
                    localStorage.setItem('manifestation_auth_error', '登入回傳處理失敗，請重新登入');
                }
            }
            await refreshAuthStatus();
            const pendingError = localStorage.getItem('manifestation_auth_error');
            if (pendingError) {
                setSyncStatus(`登入失敗：${pendingError}`);
                localStorage.removeItem('manifestation_auth_error');
            }
        }

        async function signInWithGoogle() {
            try {
                const { client } = await getAuthClient();
                await client.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: getRedirectUrl() }
                });
            } catch (error) {
                setSyncStatus('無法啟動 Gmail 登入，請確認 Supabase 已啟用 Google provider');
            }
        }

        async function signOutGoogle() {
            try {
                const { client } = await getAuthClient();
                await client.auth.signOut();
                const settings = getSyncSettings();
                localStorage.setItem(SYNC_SETTINGS_KEY, JSON.stringify({ ...settings, syncId: '' }));
                await refreshAuthStatus();
                setSyncStatus('已登出 Gmail');
            } catch {
                setSyncStatus('登出失敗');
            }
        }

        async function pushCloudSync() {
            try {
                await refreshAuthStatus();
                setSyncStatus('上傳中...');
                const { client, syncId } = await getSupabaseClient();
                const { error } = await client.from('manifestation_sync').upsert({
                    sync_id: syncId,
                    data: getAllAppData(),
                    updated_at: new Date().toISOString()
                }, { onConflict: 'sync_id' });
                if (error) throw error;
                setSyncStatus('已上傳到 Supabase');
                showToast('Supabase 同步已上傳');
            } catch (error) {
                if (error.message === 'missing-session') setSyncStatus('請先 Gmail 登入');
                else if (error.message === 'missing-settings') setSyncStatus('請先 Gmail 登入');
                else if (error.message === 'supabase-load-failed') setSyncStatus('無法載入 Supabase SDK，請檢查網路');
                else setSyncStatus(`上傳失敗：${error.message || '請檢查資料表與 RLS 權限'}`);
            }
        }

        async function pullCloudSync() {
            try {
                await refreshAuthStatus();
                setSyncStatus('下載中...');
                const { client, syncId } = await getSupabaseClient();
                const { data, error } = await client.from('manifestation_sync').select('data, updated_at').eq('sync_id', syncId).maybeSingle();
                if (error) throw error;
                if (!data) return setSyncStatus('雲端還沒有資料，請先在其中一台裝置上傳');
                applyAppData(data.data || {});
                setSyncStatus(`已下載並套用雲端資料${data.updated_at ? `｜${new Date(data.updated_at).toLocaleString()}` : ''}`);
                showToast('雲端資料已套用');
            } catch (error) {
                if (error.message === 'missing-session') setSyncStatus('請先 Gmail 登入');
                else if (error.message === 'missing-settings') setSyncStatus('請先 Gmail 登入');
                else if (error.message === 'supabase-load-failed') setSyncStatus('無法載入 Supabase SDK，請檢查網路');
                else setSyncStatus(`下載失敗：${error.message || '請檢查資料表與 RLS 權限'}`);
            }
        }

        // ================= 目標日曆 =================
        function changeMonth(dir) { currentMonth += dir; if (currentMonth < 0) { currentMonth = 11; currentYear--; } else if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(); }
        function renderCalendar() {
            document.getElementById('calendar-month-year').innerText = `${currentYear}年 ${currentMonth + 1}月`;
            const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const todos = getStorageArray('notion_todos_v2');
            const todosByDate = {};
            todos.forEach((t, i) => { if (!t.date) return; if (!todosByDate[t.date]) todosByDate[t.date] = []; todosByDate[t.date].push({ ...t, originalIndex: i }); });
            for (let i = 0; i < firstDay; i++) { grid.innerHTML += `<div class="aspect-square bg-transparent"></div>`; }
            const todayStr = getFormatDate(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate());

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = getFormatDate(currentYear, currentMonth, d); const dayTodos = todosByDate[dateStr] || []; const isToday = dateStr === todayStr;

                loadShrines(); showToast('參拜紀錄已儲存'); 
            }; 
            if(n) { if(file) compressImage(file, save); else save(null); } else showToast('請填寫神社名稱'); 
        }
        function deleteShrine(i) { const s = getStorageArray('notion_shrines'); s.splice(i, 1); localStorage.setItem('notion_shrines', JSON.stringify(s)); loadShrines(); showToast('已刪除'); }

        let timerInterval; let timeLeft = 0;
        function saveMusicToDB() { const file = document.getElementById('bgm-upload').files[0]; if (!file) return showToast('請先選擇音樂'); if (!db) return showToast('系統未準備好'); const tx = db.transaction("settings", "readwrite"); tx.objectStore("settings").put(file, "bgm"); tx.oncomplete = () => { document.getElementById('music-status').innerText = '🎵 ' + file.name; showToast('音樂已儲存'); }; }
        function loadSavedMusic() { if (!db) return; const tx = db.transaction("settings", "readonly"); const req = tx.objectStore("settings").get("bgm"); req.onsuccess = () => { if (req.result) { document.getElementById('med-audio').src = URL.createObjectURL(req.result); document.getElementById('music-status').innerText = '🎵 已載入預設本地音樂'; } }; }
        function formatTime(sec) { return `${Math.floor(sec / 60).toString().padStart(2, '0')}:${(sec % 60).toString().padStart(2, '0')}`; }
        function playDing() { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime); gain.gain.setValueAtTime(1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2); osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 2); }
        function getTimerMinutes() { return Math.min(240, Math.max(1, parseInt(document.getElementById('timer-input').value, 10) || 15)); }
        function startTimer() { clearInterval(timerInterval); const minutes = getTimerMinutes(); document.getElementById('timer-input').value = minutes; timeLeft = minutes * 60; document.getElementById('timer-display').innerText = formatTime(timeLeft); const audio = document.getElementById('med-audio'); if(audio.src) audio.play().catch(() => showToast('瀏覽器暫時無法播放音樂')); document.getElementById('btn-timer-start').innerText = "進行中..."; timerInterval = setInterval(() => { timeLeft--; document.getElementById('timer-display').innerText = formatTime(timeLeft); if (timeLeft <= 0) { stopTimer(); playDing(); } }, 1000); }
        function stopTimer() { clearInterval(timerInterval); const audio = document.getElementById('med-audio'); audio.pause(); audio.currentTime = 0; document.getElementById('btn-timer-start').innerText = "開始"; document.getElementById('timer-display').innerText = formatTime(getTimerMinutes() * 60); }
        function loadMeditations() { const meds = getStorageArray('notion_meditation'); const list = document.getElementById('meditation-list'); list.innerHTML = ''; if (meds.length === 0) { list.innerHTML = getEmptyStateHTML('留點時間給自己，開始冥想吧 🧘'); return; } [...meds].reverse().forEach((m, i) => { const div = document.createElement('div'); div.className = "bg-notion-card border border-notion-border rounded p-3 mb-2 flex justify-between items-start"; div.innerHTML = `<div class="flex-1 pr-2"><div class="flex items-center gap-2"><span class="text-xs font-semibold bg-notion-hover px-2 py-0.5 rounded text-notion-text">${escapeHTML(m.duration)} min</span><span class="text-[10px] text-notion-muted">${escapeHTML(m.date)}</span></div>${m.notes ? `<p class="text-sm text-notion-text mt-2 leading-relaxed bg-notion-hover p-2 rounded">${escapeHTML(m.notes)}</p>` : ''}</div><button onclick="deleteMeditation(${meds.length-1-i})" class="text-notion-muted opacity-40 active:opacity-100 text-xs py-1 px-2" aria-label="刪除冥想紀錄">✕</button>`; list.appendChild(div); }); }
        function saveMeditation() { const duration = getTimerMinutes(); const notes = document.getElementById('med-notes').value.trim(); if (duration) { const meds = getStorageArray('notion_meditation'); meds.push({ duration, notes, date: new Date().toLocaleDateString() }); localStorage.setItem('notion_meditation', JSON.stringify(meds)); document.getElementById('med-notes').value = ''; loadMeditations(); showToast('冥想紀錄已儲存'); } }
        function deleteMeditation(i) { const m = getStorageArray('notion_meditation'); m.splice(i, 1); localStorage.setItem('notion_meditation', JSON.stringify(m)); loadMeditations(); showToast('已刪除'); }
    </script>
</body>
